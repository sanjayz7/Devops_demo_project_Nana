<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Txpense Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh;font-size:14px}
header{background:#fff;padding:16px 20px;border-bottom:1px solid #e8e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9}
header h1{font-size:18px;font-weight:700}header h1 span{color:#6c63ff}
.nav{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#666}
.nav button{background:#f5f6fa;border:1px solid #e0e0ea;color:#333;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1}
.nav button:hover{background:#ededf8}
#mlabel{min-width:100px;text-align:center}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 16px 0}
.card{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #e8e8f0}
.card .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:6px}
.card .val{font-size:20px;font-weight:700}
.card.inc .val{color:#22c55e}.card.exp .val{color:#ef4444}.card.bal .val{color:#6c63ff}
.section{padding:14px 16px 0}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:10px}
.bud-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.bud-row span{font-size:12px;font-weight:600;color:#888}
.bud-row b{font-size:13px;color:#333}
.bar-bg{height:6px;background:#f0f0f8;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:#6c63ff;transition:width .4s,background .3s}
.bud-set{display:flex;gap:8px;margin-top:8px}
.bud-set input{flex:1;padding:7px 10px;border:1px solid #e0e0ea;border-radius:8px;font-size:13px;color:#333;background:#fafafa;outline:none}
.bud-set input:focus{border-color:#6c63ff}
.bud-set button{padding:7px 14px;border-radius:8px;border:1px solid #6c63ff;background:#ededff;color:#6c63ff;font-size:12px;font-weight:700;cursor:pointer}
.bud-set button:hover{background:#e0dfff}
.form-box{background:#fff;border-radius:12px;border:1px solid #e8e8f0;padding:16px}
.type-row{display:flex;gap:8px;margin-bottom:12px}
.tbtn{flex:1;padding:8px;border-radius:8px;border:1px solid #e0e0ea;background:#f5f6fa;color:#999;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.tbtn.active.e{background:#fff0f0;border-color:#ef4444;color:#ef4444}
.tbtn.active.i{background:#f0fdf4;border-color:#22c55e;color:#22c55e}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#aaa}
.fg input,.fg select{padding:8px 10px;border:1px solid #e0e0ea;border-radius:8px;font-size:14px;color:#333;background:#fafafa;outline:none;width:100%}
.fg input:focus,.fg select:focus{border-color:#6c63ff;background:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.add-btn{width:100%;padding:11px;border-radius:8px;border:none;background:#6c63ff;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .15s}
.add-btn:hover{opacity:.88}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-item{background:#fff;border:1px solid #e8e8f0;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px}
.cat-ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cat-n{font-size:11px;font-weight:600;color:#999}
.cat-v{font-size:14px;font-weight:700;color:#1a1a2e}
.pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:5px 12px;border-radius:99px;border:1px solid #e0e0ea;background:#fff;color:#888;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.on{background:#ededff;border-color:#6c63ff;color:#6c63ff}
.tx-list{display:flex;flex-direction:column;gap:7px}
.tx{background:#fff;border:1px solid #e8e8f0;border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.tx-ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tx-desc{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:#bbb;margin-top:1px;font-weight:500}
.tx-amt{font-size:15px;font-weight:700;margin-left:auto;flex-shrink:0}
.tx-amt.inc{color:#22c55e}.tx-amt.exp{color:#ef4444}
.tx-del{background:none;border:none;color:#ddd;cursor:pointer;font-size:18px;padding:3px 5px;border-radius:4px;transition:color .15s;line-height:1;margin-left:6px}
.tx-del:hover{color:#ef4444}
.empty{text-align:center;color:#ccc;padding:28px;font-size:13px;font-weight:600}
@media(max-width:400px){.cards{grid-template-columns:1fr 1fr}.card.bal{grid-column:1/-1}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <h1>Spend<span>.</span></h1>
  <div class="nav">
    <button id="pm">&#8249;</button>
    <span id="mlabel"></span>
    <button id="nm">&#8250;</button>
  </div>
</header>

<div class="cards">
  <div class="card inc"><div class="lbl">Income</div><div class="val" id="ti">₹0</div></div>
  <div class="card exp"><div class="lbl">Spent</div><div class="val" id="te">₹0</div></div>
  <div class="card bal"><div class="lbl">Balance</div><div class="val" id="tb">₹0</div></div>
</div>

<div class="section">
  <div class="sec-title">Budget</div>
  <div class="bud-row"><span>Monthly limit</span><b id="blbl">Not set</b></div>
  <div class="bar-bg"><div class="bar-fill" id="bbar" style="width:0%"></div></div>
  <div class="bud-set">
    <input type="number" id="bi" placeholder="Set budget amount…" min="0">
    <button onclick="setBudget()">Set</button>
  </div>
</div>

<div class="section">
  <div class="sec-title">Add Transaction</div>
  <div class="form-box">
    <div class="type-row">
      <button class="tbtn e active" id="be" onclick="setType('expense')">▼ Expense</button>
      <button class="tbtn i" id="bi2" onclick="setType('income')">▲ Income</button>
    </div>
    <div class="fg"><label>Description</label><input type="text" id="fd" placeholder="e.g. Groceries"></div>
    <div class="row2">
      <div class="fg"><label>Amount (₹)</label><input type="number" id="fa" placeholder="0" min="0"></div>
      <div class="fg"><label>Date</label><input type="date" id="fdt"></div>
    </div>
    <div class="fg"><label>Category</label>
      <select id="fc">
        <option>🍔 Food</option><option>🚗 Transport</option><option>🏠 Housing</option>
        <option>💊 Health</option><option>🎮 Entertainment</option><option>👕 Shopping</option>
        <option>📚 Education</option><option>💼 Salary</option><option>💸 Other</option>
      </select>
    </div>
    <button class="add-btn" onclick="addTx()">+ Add</button>
  </div>
</div>

<div class="section">
  <div class="sec-title">By Category</div>
  <div class="cat-grid" id="cg"></div>
</div>

<div class="section" style="padding-bottom:24px">
  <div class="sec-title">Transactions</div>
  <div class="pills" id="pills">
    <div class="pill on" onclick="filt('All',this)">All</div>
    <div class="pill" onclick="filt('expense',this)">Expenses</div>
    <div class="pill" onclick="filt('income',this)">Income</div>
    <div class="pill" onclick="filt('🍔 Food',this)">Food</div>
    <div class="pill" onclick="filt('🚗 Transport',this)">Transport</div>
    <div class="pill" onclick="filt('🏠 Housing',this)">Housing</div>
    <div class="pill" onclick="filt('🎮 Entertainment',this)">Fun</div>
    <div class="pill" onclick="filt('👕 Shopping',this)">Shopping</div>
  </div>
  <div style="height:10px"></div>
  <div class="tx-list" id="tl"></div>
</div>

<script>
let txs=JSON.parse(localStorage.getItem('sp_tx')||'[]');
let bud=parseFloat(localStorage.getItem('sp_bud')||'0');
let curType='expense',curFilt='All';
let vd=new Date();
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const fmt=v=>'₹'+Math.abs(v).toLocaleString('en-IN',{maximumFractionDigits:2});
const BG=['#f0edff','#edfdf5','#fff0f0','#fff8ed','#f0f8ff','#fdf0ff'];

function mTxs(){return txs.filter(t=>{const d=new Date(t.date);return d.getFullYear()===vd.getFullYear()&&d.getMonth()===vd.getMonth()})}
function save(){localStorage.setItem('sp_tx',JSON.stringify(txs))}

function setType(t){
  curType=t;
  document.getElementById('be').className='tbtn e'+(t==='expense'?' active':'');
  document.getElementById('bi2').className='tbtn i'+(t==='income'?' active':'');
}
function filt(f,el){
  curFilt=f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  renderList();
}
function addTx(){
  const desc=document.getElementById('fd').value.trim();
  const amt=parseFloat(document.getElementById('fa').value);
  const date=document.getElementById('fdt').value;
  const cat=document.getElementById('fc').value;
  if(!desc||!amt||amt<=0||!date){alert('Please fill all fields.');return;}
  txs.unshift({id:Date.now(),desc,amount:amt,type:curType,category:cat,date});
  save();
  document.getElementById('fd').value='';
  document.getElementById('fa').value='';
  render();
}
function delTx(id){txs=txs.filter(t=>t.id!==id);save();render();}
function setBudget(){
  const v=parseFloat(document.getElementById('bi').value);
  if(!v||v<=0)return;
  bud=v;localStorage.setItem('sp_bud',bud);
  document.getElementById('bi').value='';
  renderSummary();
}

function renderSummary(){
  const mt=mTxs();
  const inc=mt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=mt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  document.getElementById('ti').textContent=fmt(inc);
  document.getElementById('te').textContent=fmt(exp);
  document.getElementById('tb').textContent=(bal<0?'-':'')+fmt(bal);
  document.getElementById('tb').style.color=bal<0?'#ef4444':'#6c63ff';
  document.getElementById('mlabel').textContent=MN[vd.getMonth()].slice(0,3)+' '+vd.getFullYear();
  if(bud>0){
    const pct=Math.min(100,(exp/bud)*100);
    document.getElementById('bbar').style.width=pct+'%';
    document.getElementById('bbar').style.background=pct>90?'#ef4444':pct>70?'#f59e0b':'#6c63ff';
    document.getElementById('blbl').textContent=fmt(exp)+' / '+fmt(bud);
  } else {
    document.getElementById('bbar').style.width='0%';
    document.getElementById('blbl').textContent='Not set';
  }
}

function renderCats(){
  const cats={};
  mTxs().filter(t=>t.type==='expense').forEach(t=>{cats[t.category]=(cats[t.category]||0)+t.amount;});
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const g=document.getElementById('cg');
  if(!sorted.length){g.innerHTML='<div class="empty" style="grid-column:1/-1">No expenses yet</div>';return;}
  g.innerHTML=sorted.map(([cat,amt],i)=>{
    const parts=cat.split(' ');const ic=parts[0];const name=parts.slice(1).join(' ')||cat;
    return`<div class="cat-item"><div class="cat-ic" style="background:${BG[i%6]}">${ic}</div><div><div class="cat-n">${name}</div><div class="cat-v">${fmt(amt)}</div></div></div>`;
  }).join('');
}

function renderList(){
  const list=mTxs().filter(t=>{
    if(curFilt==='All')return true;
    if(curFilt==='income'||curFilt==='expense')return t.type===curFilt;
    return t.category===curFilt;
  });
  const el=document.getElementById('tl');
  if(!list.length){el.innerHTML='<div class="empty">No transactions found</div>';return;}
  el.innerHTML=list.map(t=>{
    const ic=t.category.split(' ')[0];
    const sign=t.type==='income'?'+':'-';
    const dt=new Date(t.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    const ibg=t.type==='income'?'#edfdf5':'#fff0f0';
    const catName=t.category.split(' ').slice(1).join(' ')||t.category;
    return`<div class="tx">
      <div class="tx-ic" style="background:${ibg}">${ic}</div>
      <div style="flex:1;min-width:0"><div class="tx-desc">${t.desc}</div><div class="tx-meta">${catName} · ${dt}</div></div>
      <div class="tx-amt ${t.type}">${sign}${fmt(t.amount)}</div>
      <button class="tx-del" onclick="delTx(${t.id})">×</button>
    </div>`;
  }).join('');
}

function render(){renderSummary();renderCats();renderList();}
document.getElementById('pm').onclick=()=>{vd.setMonth(vd.getMonth()-1);render();};
document.getElementById('nm').onclick=()=>{vd.setMonth(vd.getMonth()+1);render();};
document.getElementById('fdt').valueAsDate=new Date();
render();
</script>
</body>
</html>
